<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 dib&candy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍭 dib&candy</h1>
    <p>اختار اللي نفسك فيه 👇</p>

    <div class="grid">
        <a href="gift.html" class="card">🎁 بوكسات وبوكيهات</a>
        <a href="indomie.html" class="card">🍜 اندومي وتوبوكي</a>
        <a href="sweets.html" class="card">🍭 سويتس وكاندي</a>
        <a href="snacks.html" class="card">سناكس</a>
    </div>
</div>

</body>
</html>
